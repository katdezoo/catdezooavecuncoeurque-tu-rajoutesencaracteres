<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRODUCERSWORLDCUP</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: purple;
      background: black;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .gif-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image: url("./fond.gif");
      background-position: center center;
      background-size: contain;
      background-repeat: no-repeat;
      background-color: black;
      z-index: 0;
    }

    .overlay {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      background: transparent;
      display: flex;
      flex-direction: column;
    }

    nav {
      background: transparent;
      padding: 12px;
      text-align: center;
    }

    nav a {
      color: purple;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
      cursor: pointer;
      text-shadow: 2px 2px 5px white;
      font-size: 18px;
    }

    nav a:hover {
      color: violet;
    }

    .page-section {
      display: none;
      min-height: 70vh;
      max-width: 900px;
      margin: auto;
      text-align: center;
      padding: 20px;
    }

    .active {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 150px;
      color: purple;
      text-shadow: 3px 3px 8px white;
      word-break: break-word;
      overflow-wrap: anywhere;
      line-height: 1.3;
    }

    p {
      font-size: 10px;
      color: black;
      text-shadow: 1px 1px 3px black;
    }

    .card {
      background: transparent;
      padding: 25px;
      border-radius: 12px;
      margin-top: 70px;
      text-align: center;
    }

    .audio-box {
      position: fixed;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      z-index: 5;
    }

    audio {
      width: 280px;
      max-width: 90vw;
      filter: drop-shadow(2px 2px 8px black);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: transparent;
      color: black;
      position: fixed;
      bottom: 55px;
      width: 100%;
      text-shadow: 2px 2px 6px white;
      box-sizing: border-box;
      z-index: 2;
      pointer-events: none;
    }

    @media screen and (max-width: 600px) {
      .gif-bg {
        background-size: contain;
        background-position: center center;
        background-repeat: no-repeat;
        background-color: red;
      }

      nav {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 18px 10px;
      }

      nav a {
        margin: 0;
        font-size: 20px;
      }

      .page-section {
        min-height: auto;
        padding: 10px 12px 140px 12px;
        margin: 0 auto;
      }

      .active {
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      h1 {
        font-size: 17px;
        margin-top: 10px;
        margin-bottom: 0;
        line-height: 1.4;
      }

      .card {
        margin-top: 0;
        padding: 10px;
      }

      .audio-box {
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
      }

      audio {
        width: 260px;
        max-width: 90vw;
      }

      footer {
        bottom: 80px;
        padding: 10px;
      }

      footer p {
        font-size: 6px;
      }
    }
  </style>
</head>

<body>

  <div class="gif-bg"></div>

  <div class="overlay">

    <nav>
      <a onclick="afficherSection('accueil')">starthere</a>
      <a onclick="afficherSection('apropos')">RULES</a>
      <a onclick="afficherSection('contact')">SEND A WAV / MP3</a>
    </nav>

    <section id="accueil" class="page-section active">
    </section>

    <section id="apropos" class="page-section">
      <div class="card">
        <h1>
          RULES/<br>
          N1 USE A 2000s MUSIC/<br>
          N2 DO A REMIX/<br>
          N3 LESS THAN 1MIN30/&lt;3
        </h1>
      </div>
    </section>

    <section id="contact" class="page-section">
      <div class="card">
        <h1>@gmail.com</h1>
      </div>
    </section>

    <footer>
      <p>© 2026 katdezoo&lt;3. Tous droits réservés.</p>
    </footer>

  </div>

  <div class="audio-box">
    <audio controls>
      <source src="./musique.wav" type="audio/wav">
    </audio>
  </div>

  <script>
    function afficherSection(id) {
      const sections = document.querySelectorAll(".page-section");

      sections.forEach(section => {
        section.classList.remove("active");
      });

      document.getElementById(id).classList.add("active");
    }
  </script>

</body>
</html>
