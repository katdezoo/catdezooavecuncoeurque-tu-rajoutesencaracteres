<!DOCTYPE html>

<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Global Producers Cup</title>

  <style>
    @font-face {
      font-family: 'DSEG7 Classic';
      font-style: normal;
      font-display: swap;
      font-weight: 400;
      src: url(https://cdn.jsdelivr.net/fontsource/fonts/dseg7-classic@latest/latin-400-normal.woff2) format('woff2'), url(https://cdn.jsdelivr.net/fontsource/fonts/dseg7-classic@latest/latin-400-normal.woff) format('woff');
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: red;
      background: #ff00ff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .intro-page {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: black;
      color: white;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      padding: 20px;
      box-sizing: border-box;
      overflow: hidden;
    }

    .intro-gif {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image: none;
      background-position: center center;
      background-size: contain;
      background-repeat: no-repeat;
      z-index: 1;
    }

    .gif-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image: none;
      background-position: center center;
      background-size: contain;
      background-repeat: no-repeat;
      background-color: #ff00ff;
      z-index: 0;
    }

    .overlay {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      background: transparent;
      display: flex;
      flex-direction: column;
    }

    nav {
      background: transparent;
      padding: 12px;
      text-align: center;
      position: relative;
      z-index: 20;
    }

    nav button {
      color: #ff4fd8;
      background: transparent;
      border: none;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
      cursor: pointer;
      -webkit-text-stroke: 0.7px #00ff00;
      paint-order: stroke fill;
      text-shadow:
        -2px -2px 0 #000000,
        0 -2px 0 #000000,
        2px -2px 0 #000000,
        -2px 0 0 #000000,
        2px 0 0 #000000,
        -2px 2px 0 #000000,
        0 2px 0 #000000,
        2px 2px 0 #000000,
        0 0 4px #000000,
        0 0 12px #ff0000,
        0 0 30px #ff0000,
        0 0 60px #ff0000,
        0 0 95px #ff0000,
        0 0 135px #ff0000,
        0 0 170px #ff0000;
      font-size: 18px;
      font-family: Arial, sans-serif;
      position: relative;
      z-index: 21;
    }

    nav button:hover {
      color: #ff4fd8;
      -webkit-text-stroke: 0.7px #00ff00;
      paint-order: stroke fill;
      text-shadow:
        -2px -2px 0 #000000,
        0 -2px 0 #000000,
        2px -2px 0 #000000,
        -2px 0 0 #000000,
        2px 0 0 #000000,
        -2px 2px 0 #000000,
        0 2px 0 #000000,
        2px 2px 0 #000000,
        0 0 4px #000000,
        0 0 12px #ff0000,
        0 0 30px #ff0000,
        0 0 60px #ff0000,
        0 0 95px #ff0000,
        0 0 135px #ff0000,
        0 0 170px #ff0000;
    }

    .paris-timer {
      color: black;
      font-family: "DSEG7 Classic", "Courier New", monospace;
      font-size: 80px;
      font-weight: 400;
      text-align: center;
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
      text-shadow: none;
      position: fixed;
      top: 18vh;
      left: 50%;
      transform: translateX(-50%);
      z-index: 25;
      pointer-events: none;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.15em;
      line-height: 1;
      width: max-content;
    }

    #timerTime {
      display: inline-block;
      width: 8ch;
      font-family: "DSEG7 Classic", "Courier New", monospace;
      font-size: 1em;
      line-height: 1;
      text-align: center;
    }

    .timer-period {
      display: inline-block;
      width: 2.2em;
      flex: 0 0 2.2em;
      font-family: Arial, sans-serif;
      font-size: 0.35em;
      letter-spacing: 0;
      line-height: 1;
      vertical-align: middle;
      text-align: left;
    }

    .page-section {
      display: none;
      min-height: auto;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      text-align: center;
      padding: 20px;
      pointer-events: none;
      position: fixed;
      top: 58vh;
      left: 50%;
      transform: translateX(-50%);
      z-index: 40;
      box-sizing: border-box;
    }

    .active {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 150px;
      color: #ff4fd8;
      -webkit-text-stroke: 0.7px #00ff00;
      paint-order: stroke fill;
      text-shadow:
        -2px -2px 0 #000000,
        0 -2px 0 #000000,
        2px -2px 0 #000000,
        -2px 0 0 #000000,
        2px 0 0 #000000,
        -2px 2px 0 #000000,
        0 2px 0 #000000,
        2px 2px 0 #000000,
        0 0 4px #000000,
        0 0 12px #ff0000,
        0 0 30px #ff0000,
        0 0 60px #ff0000,
        0 0 95px #ff0000,
        0 0 135px #ff0000,
        0 0 170px #ff0000;
      word-break: break-word;
      overflow-wrap: anywhere;
      line-height: 1.3;
      position: relative;
      z-index: 45;
    }

    p {
      font-size: 10px;
      color: black;
      text-shadow: 1px 1px 3px black;
    }

    .card {
      background: transparent;
      padding: 25px;
      border-radius: 12px;
      margin-top: 0;
      text-align: center;
      position: relative;
      z-index: 45;
    }

    @media screen and (min-width: 601px) {
      nav {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 30px;
        padding: 18px 12px 6px 12px;
      }

      nav button {
        margin: 0;
        transform: translateY(4px);
        text-shadow:
          -2px -2px 0 #000000,
          0 -2px 0 #000000,
          2px -2px 0 #000000,
          -2px 0 0 #000000,
          2px 0 0 #000000,
          -2px 2px 0 #000000,
          0 2px 0 #000000,
          2px 2px 0 #000000,
          0 0 4px #000000,
          0 0 18px #ff0000,
          0 0 45px #ff0000,
          0 0 85px #ff0000,
          0 0 130px #ff0000,
          0 0 190px #ff0000,
          0 0 260px #ff0000,
          0 0 340px #ff0000;
      }

      nav button:hover {
        text-shadow:
          -2px -2px 0 #000000,
          0 -2px 0 #000000,
          2px -2px 0 #000000,
          -2px 0 0 #000000,
          2px 0 0 #000000,
          -2px 2px 0 #000000,
          0 2px 0 #000000,
          2px 2px 0 #000000,
          0 0 4px #000000,
          0 0 18px #ff0000,
          0 0 45px #ff0000,
          0 0 85px #ff0000,
          0 0 130px #ff0000,
          0 0 190px #ff0000,
          0 0 260px #ff0000,
          0 0 340px #ff0000;
      }

      #apropos {
        top: calc(54vh + 10px);
      }

      #apropos h1 {
        font-size: 24px;
        margin-bottom: 12px;
        text-shadow:
          -2px -2px 0 #000000,
          0 -2px 0 #000000,
          2px -2px 0 #000000,
          -2px 0 0 #000000,
          2px 0 0 #000000,
          -2px 2px 0 #000000,
          0 2px 0 #000000,
          2px 2px 0 #000000,
          0 0 4px #000000,
          0 0 18px #ff0000,
          0 0 45px #ff0000,
          0 0 85px #ff0000,
          0 0 130px #ff0000,
          0 0 190px #ff0000,
          0 0 260px #ff0000,
          0 0 340px #ff0000;
      }

      #apropos .card {
        margin-top: 0;
      }

      #contact .card {
        margin-top: 0;
      }
    }

    .audio-box {
      display: none;
      position: fixed;
      left: 50%;
      bottom: 45px;
      transform: translateX(-50%);
      z-index: 10001;
      width: 220px;
      max-width: 80vw;
    }

    .audio-word-display {
      min-height: clamp(40px, 6vw, 68px);
      width: max-content;
      max-width: min(96vw, 820px);
      margin: 0 auto 8px auto;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
      overflow: visible;
      white-space: nowrap;
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 700;
      line-height: 1;
      color: #ff0000;
      -webkit-text-stroke: 0.7px #000000;
      paint-order: stroke fill;
      text-shadow:
        -2px -2px 0 #000000,
        0 -2px 0 #000000,
        2px -2px 0 #000000,
        -2px 0 0 #000000,
        2px 0 0 #000000,
        -2px 2px 0 #000000,
        0 2px 0 #000000,
        2px 2px 0 #000000,
        0 0 4px #000000;
      opacity: 0;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .audio-word-display.active {
      opacity: 1;
    }

    audio {
      display: block;
      width: 100%;
      max-width: 100%;
      min-width: 100%;
      height: 32px;
      filter: drop-shadow(2px 2px 8px black);
    }

    .volume-boost-box {
      margin-top: 10px;
      font-family: Arial, sans-serif;
      color: black;
      text-align: center;
      font-size: 13px;
      font-weight: bold;
      text-shadow:
        0 0 5px #00ff00,
        0 0 12px #00ff00;
      user-select: none;
      -webkit-user-select: none;
          position: relative;
      isolation: isolate;
      overflow: visible;
      --volume-position: 50%;
    }

    .volume-boost-box::before {
      content: "";
      position: absolute;
      left: var(--volume-position);
      top: clamp(28px, 3.2vw, 38px);
      width: clamp(92px, 10vw, 156px);
      height: clamp(58px, 6vw, 92px);
      transform: translate(-50%, -38%);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.70);
      filter: blur(16px);
      box-shadow:
        0 0 22px 10px rgba(255, 255, 255, 0.72),
        0 0 48px 22px rgba(255, 255, 255, 0.42);
      pointer-events: none;
      z-index: -2;
    }

    .volume-boost-box label {
      display: inline-block;
      overflow: visible;
      margin: 4px auto 3px auto;
      padding: 0 10px;
      line-height: 1.25;
      cursor: default;
      user-select: none;
      -webkit-user-select: none;
          position: relative;
      z-index: 10;
      isolation: isolate;
    }
    .volume-boost-box label::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: clamp(128px, 13vw, 190px);
      height: clamp(24px, 3vw, 42px);
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      filter: blur(12px);
      box-shadow:
        0 0 20px 10px rgba(255, 255, 255, 0.72),
        0 0 44px 20px rgba(255, 255, 255, 0.42);
      pointer-events: none;
      z-index: -1;
    }


    .volume-word {
      display: inline-block;
      position: relative;
      z-index: 11;
      color: #00ff00;
      -webkit-text-stroke: 0.35px #000000;
      paint-order: stroke fill;
      text-shadow:
        -1px -1px 0 #000000,
        0 -1px 0 #000000,
        1px -1px 0 #000000,
        -1px 0 0 #000000,
        1px 0 0 #000000,
        -1px 1px 0 #000000,
        0 1px 0 #000000,
        1px 1px 0 #000000,
        0 0 5px #000000,
        0 0 12px #000000;
    }

    #volumeValue {
      display: inline-block;
      position: relative;
      z-index: 11;
      color: #ff0000;
      cursor: default;
      user-select: none;
      -webkit-user-select: none;
      -webkit-text-stroke: 0.35px #000000;
      paint-order: stroke fill;
      text-shadow:
        -1px -1px 0 #000000,
        0 -1px 0 #000000,
        1px -1px 0 #000000,
        -1px 0 0 #000000,
        1px 0 0 #000000,
        -1px 1px 0 #000000,
        0 1px 0 #000000,
        1px 1px 0 #000000,
        0 0 5px #ff0000,
        0 0 12px #ff0000;
    }

    .volume-slider-wrap,
    .audio-progress-wrap,
    .audio-time-row {
      position: relative;
      width: clamp(260px, 38vw, 420px);
      left: 50%;
      transform: translateX(-50%);
      cursor: default;
          z-index: 30;
    }

    .volume-slider-wrap::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      height: 18px;
      background: #ff0000;
      transform: translate(-50%, -50%);
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      z-index: 0;
      box-shadow:
        0 0 4px #ff0000,
        0 0 8px #ff0000;
    }

    #volumeBoost {
      display: block;
      position: relative;
      z-index: 40;
      width: 100%;
      cursor: pointer;
      accent-color: #ff0000;
      touch-action: pan-x;
      background: transparent;
      user-select: auto;
      -webkit-user-select: auto;
    }

    .audio-progress-box {
      margin-top: 5px;
      font-family: Arial, sans-serif;
      color: black;
      text-align: center;
      font-size: 10px;
      font-weight: bold;
      text-shadow:
        0 0 5px #00ff00,
        0 0 12px #00ff00;
      user-select: none;
      -webkit-user-select: none;
    }

    .audio-time-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 3px;
      margin-bottom: 0;
      font-size: 10px;
      line-height: 1;
      pointer-events: none;
    }

    #audioProgress {
      display: block;
      position: relative;
      z-index: 2;
      width: 100%;
      cursor: pointer;
      accent-color: #ff0000;
      touch-action: pan-x;
      background: transparent;
      user-select: auto;
      -webkit-user-select: auto;
    }

    #volumeBoost,
    #audioProgress {
      -webkit-appearance: none;
      appearance: none;
      height: 12px;
      border-radius: 999px;
      outline: none;
      background: transparent;
    }

    #volumeBoost::-webkit-slider-runnable-track,
    #audioProgress::-webkit-slider-runnable-track {
      height: 6px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(0, 0, 0, 0.65);
      box-shadow:
        0 0 4px #00ff00,
        0 0 8px #ff0000;
    }

    #volumeBoost::-moz-range-track,
    #audioProgress::-moz-range-track {
      height: 6px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(0, 0, 0, 0.65);
      box-shadow:
        0 0 4px #00ff00,
        0 0 8px #ff0000;
    }

    #volumeBoost::-webkit-slider-thumb,
    #audioProgress::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      margin-top: -7px;
      border-radius: 50%;
      border: 2px solid #000000;
      background: #ff0000;
      box-shadow:
        0 0 0 1px #000000,
        0 0 7px #00ff00,
        0 0 12px #ff0000;
    }

    #volumeBoost::-moz-range-thumb,
    #audioProgress::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #000000;
      background: #ff0000;
      box-shadow:
        0 0 0 1px #000000,
        0 0 7px #00ff00,
        0 0 12px #ff0000;
    }
      #volumeBoost::-webkit-slider-thumb {
        position: relative;
        z-index: 50;
        transform: scale(1.08);
        border-color: #000000;
        background: radial-gradient(circle, #ff4a4a 0%, #ff0000 70%, #8b0000 100%);
        box-shadow:
          0 0 0 1px #ff0000,
          0 0 0 2px #000000,
          0 0 7px 2px #000000,
          0 0 12px #ff0000,
          0 0 18px rgba(255, 0, 0, 0.66);
      }
      #volumeBoost::-moz-range-thumb {
        position: relative;
        z-index: 50;
        transform: scale(1.08);
        border-color: #000000;
        background: radial-gradient(circle, #ff4a4a 0%, #ff0000 70%, #8b0000 100%);
        box-shadow:
          0 0 0 1px #ff0000,
          0 0 0 2px #000000,
          0 0 7px 2px #000000,
          0 0 12px #ff0000,
          0 0 18px rgba(255, 0, 0, 0.66);
      }

    #audioProgress::-webkit-slider-thumb {
      transform: scale(1.08);
      border-color: #ffffff;
      background: radial-gradient(circle, #2b2b2b 0%, #000000 70%, #000000 100%);
      box-shadow:
        0 0 0 1px #000000,
        0 0 0 2px #ffffff,
        0 0 7px #ffffff,
        0 0 14px #000000;
    }

    #audioProgress::-moz-range-thumb {
      transform: scale(1.08);
      border-color: #ffffff;
      background: radial-gradient(circle, #2b2b2b 0%, #000000 70%, #000000 100%);
      box-shadow:
        0 0 0 1px #000000,
        0 0 0 2px #ffffff,
        0 0 7px #ffffff,
        0 0 14px #000000;
    }

    .volume-warning {
      display: none;
      margin-top: 5px;
      font-size: clamp(15px, 1.15vw, 20px);
      font-weight: bold;
      color: black;
      text-shadow:
        0 0 5px #ff0000,
        0 0 10px #ff0000;
    }

    .volume-warning.fort {
      font-size: clamp(18px, 1.45vw, 25px);
      text-shadow:
        0 0 6px #ff0000,
        0 0 14px #ff0000,
        0 0 24px #ff0000;
    }

    .audio-footer {
      position: static;
      width: 100%;
      padding: 6px 0 0 0;
      margin: 0;
      text-align: center;
      background: transparent;
      color: black;
      text-shadow: 2px 2px 6px black;
      box-sizing: border-box;
      pointer-events: none;
    }

    .audio-footer p {
      margin: 0;
      font-size: 10px;
      color: black;
      text-shadow:
        0 0 4px #00ff00,
        1px 1px 3px black;
    }

    @media screen and (min-width: 601px) and (max-width: 1024px) {
      nav {
        gap: clamp(18px, 3vw, 30px);
        padding: 16px 12px 6px 12px;
      }

      nav button {
        font-size: clamp(16px, 2.1vw, 19px);
      }

      .paris-timer {
        top: 18vh;
        font-size: clamp(58px, 7.2vw, 78px);
      }

      .page-section {
        top: 58vh;
        max-width: 860px;
        padding: 18px;
      }

      #apropos {
        top: calc(54vh + 10px);
      }

      #apropos h1 {
        font-size: clamp(21px, 2.5vw, 26px);
      }

      #contact h1 {
        font-size: clamp(38px, 5vw, 50px);
      }

      .audio-box {
        width: clamp(200px, 26vw, 230px);
        bottom: 45px;
      }

      .volume-slider-wrap,
      .audio-progress-wrap,
      .audio-time-row {
        width: clamp(260px, 46vw, 420px);
      }

      .volume-boost-box label {
        font-size: clamp(13px, 1.6vw, 17px);
        padding: 0 9px;
      }

      .volume-boost-box::before {
        top: clamp(24px, 3vw, 32px);
        width: clamp(88px, 12vw, 148px);
        height: clamp(54px, 7vw, 86px);
        filter: blur(15px);
        box-shadow:
          0 0 20px 9px rgba(255, 255, 255, 0.72),
          0 0 44px 20px rgba(255, 255, 255, 0.42);
      }

      .volume-boost-box label::before {
        top: 50%;
        width: clamp(120px, 16vw, 178px);
        height: clamp(22px, 3vw, 38px);
        filter: blur(11px);
        box-shadow:
          0 0 18px 9px rgba(255, 255, 255, 0.72),
          0 0 40px 18px rgba(255, 255, 255, 0.42);
      }




      #volumeBoost::-webkit-slider-thumb,
      #audioProgress::-webkit-slider-thumb {
        width: 17px;
        height: 17px;
        margin-top: -6.5px;
      }

      #volumeBoost::-moz-range-thumb,
      #audioProgress::-moz-range-thumb {
        width: 17px;
        height: 17px;
      }
      #volumeBoost::-webkit-slider-thumb {
        position: relative;
        z-index: 50;
        transform: scale(1.08);
        border-color: #000000;
        background: radial-gradient(circle, #ff4a4a 0%, #ff0000 70%, #8b0000 100%);
        box-shadow:
          0 0 0 1px #ff0000,
          0 0 0 2px #000000,
          0 0 7px 2px #000000,
          0 0 12px #ff0000,
          0 0 18px rgba(255, 0, 0, 0.66);
      }
      #volumeBoost::-moz-range-thumb {
        position: relative;
        z-index: 50;
        transform: scale(1.08);
        border-color: #000000;
        background: radial-gradient(circle, #ff4a4a 0%, #ff0000 70%, #8b0000 100%);
        box-shadow:
          0 0 0 1px #ff0000,
          0 0 0 2px #000000,
          0 0 7px 2px #000000,
          0 0 12px #ff0000,
          0 0 18px rgba(255, 0, 0, 0.66);
      }
    }

    @media screen and (max-width: 600px) {
      .intro-page {
        font-size: 22px;
      }

      .intro-gif {
        background-size: 100% 120%;
        background-position: center center;
        background-repeat: no-repeat;
      }

      .gif-bg {
        background-size: 100% 120%;
        background-position: center center;
        background-repeat: no-repeat;
        background-color: #ff00ff;
      }

      .overlay {
        z-index: auto;
      }

      nav {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 18px 10px;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        box-sizing: border-box;
        z-index: 10002;
      }

      nav button {
        margin: 0;
        font-size: 20px;
      }

      .paris-timer {
        top: 26vh;
        font-size: 52px;

  <script>
    let audioContext = null;
    let sourceNode = null;
    let gainNode = null;

    setTimeout(function() {
      document.getElementById("introText").textContent = "<3";
    }, 3500);

    setTimeout(function() {
      document.getElementById("introText").style.display = "none";
      document.getElementById("introGif").style.display = "none";
      document.getElementById("introPage").style.display = "none";
      document.getElementById("menuPrincipal").style.display = "";
      document.querySelector(".audio-box").style.display = "block";

      const lecteur = document.getElementById("lecteurAudio");
      lecteur.load();
      setTimeout(function() {
        mettreAJourEffetsBlancsVolumeGlobal();
      }, 80);
    }, 5500);



    let animationEffetsBlancsVolume = null;

    function demanderMajEffetsBlancsVolume() {
      if (animationEffetsBlancsVolume) {
        return;
      }

      animationEffetsBlancsVolume = requestAnimationFrame(function() {
        animationEffetsBlancsVolume = null;
        mettreAJourEffetsBlancsVolumeGlobal();
      });
    }

    function mettreAJourEffetsBlancsVolumeGlobal(valeurForcee) {
      const volumeBoost = document.getElementById("volumeBoost");
      const volumeLabel = document.querySelector(".volume-boost-box label");
      const volumeTextWhiteGlow = document.getElementById("volumeTextWhiteGlow");
      const volumeThumbWhiteGlow = document.getElementById("volumeThumbWhiteGlow");

      if (!volumeBoost || !volumeLabel || !volumeTextWhiteGlow || !volumeThumbWhiteGlow) {
        return;
      }

      const sliderRect = volumeBoost.getBoundingClientRect();
      const labelRect = volumeLabel.getBoundingClientRect();

      if (sliderRect.width <= 0 || sliderRect.height <= 0 || labelRect.width <= 0 || labelRect.height <= 0) {
        volumeTextWhiteGlow.classList.remove("visible");
        volumeThumbWhiteGlow.classList.remove("visible");
        return;
      }

      const valeur = Number.isFinite(Number(valeurForcee)) ? Number(valeurForcee) : Number(volumeBoost.value);
      const volumeMin = Number(volumeBoost.min);
      const volumeMax = Number(volumeBoost.max);
      const ratio = Math.min(1, Math.max(0, (valeur - volumeMin) / (volumeMax - volumeMin)));

      const thumbX = sliderRect.left + sliderRect.width * ratio;
      const thumbY = sliderRect.top + sliderRect.height / 2;
      const labelX = labelRect.left + labelRect.width / 2;
      const labelY = labelRect.top + labelRect.height / 2;

      volumeThumbWhiteGlow.style.setProperty("--glow-x", thumbX + "px");
      volumeThumbWhiteGlow.style.setProperty("--glow-y", thumbY + "px");
      volumeTextWhiteGlow.style.setProperty("--glow-x", labelX + "px");
      volumeTextWhiteGlow.style.setProperty("--glow-y", labelY + "px");

      volumeTextWhiteGlow.classList.add("visible");
      volumeThumbWhiteGlow.classList.add("visible");
    }

    function afficherSection(id) {
      const sections = document.querySelectorAll(".page-section");

      sections.forEach(section => {
        section.classList.remove("active");
      });

      document.getElementById(id).classList.add("active");
    }

    function initialiserVolumeBoost() {
      const volumeBoost = document.getElementById("volumeBoost");
      const volumeValue = document.getElementById("volumeValue");
      const volumeWarning = document.getElementById("volumeWarning");
      const volumeBoostBox = document.querySelector(".volume-boost-box");

      let animationVolume = null;
      let dernierRelachementVolume = 0;

      function appliquerAimant(valeur) {
        const centreAimant = 100;
        const margeAimantGauche = 75;
        const margeAimantDroite = 49;

        if (valeur >= centreAimant - margeAimantGauche && valeur <= centreAimant + margeAimantDroite) {
          return 100;
        }

        return valeur;
      }

      function courbeDouce(progression) {
        return 1 - Math.pow(1 - progression, 3);
      }

      function appliquerVolume(valeur) {
        volumeValue.textContent = Math.round(valeur) + "%";
        mettreAJourEffetsBlancsVolumeGlobal(valeur);
        setTimeout(demanderMajEffetsBlancsVolume, 0);
        const volumeMin = Number(volumeBoost.min);
        const volumeMax = Number(volumeBoost.max);
        const positionVolume = Math.min(100, Math.max(0, ((valeur - volumeMin) / (volumeMax - volumeMin)) * 100));

        if (volumeBoostBox) {
          volumeBoostBox.style.setProperty("--volume-position", positionVolume + "%");
        }


        if (gainNode) {
          gainNode.gain.value = valeur / 100;
        }

        if (valeur >= 150) {
          volumeWarning.textContent = "⚠. 150% ???";
          volumeWarning.classList.add("fort");
          volumeWarning.style.display = "block";
        } else if (valeur > 100) {
          volumeWarning.textContent = "⚠. 100% is the good way.";
          volumeWarning.classList.remove("fort");
          volumeWarning.style.display = "block";
        } else {
          volumeWarning.classList.remove("fort");
          volumeWarning.style.display = "none";
        }
      }

      function animerVolumeVers100(valeurDepart) {
        if (animationVolume) {
          cancelAnimationFrame(animationVolume);
          animationVolume = null;
        }

        const debut = performance.now();
        const duree = 220;
        const arrivee = 100;

        function animation(temps) {
          const progression = Math.min((temps - debut) / duree, 1);
          const valeurAnimee = valeurDepart + (arrivee - valeurDepart) * courbeDouce(progression);
          const valeurArrondie = Math.round(valeurAnimee);

          volumeBoost.value = valeurArrondie;
          appliquerVolume(valeurArrondie);

          if (progression < 1) {
            animationVolume = requestAnimationFrame(animation);
          } else {
            volumeBoost.value = 100;
            appliquerVolume(100);
            animationVolume = null;
          }
        }

        animationVolume = requestAnimationFrame(animation);
      }

      function mettreAJourVolume(avecAimant, aimantFluide) {
        let valeur = Number(volumeBoost.value);

        if (avecAimant) {
          const valeurAimantee = appliquerAimant(valeur);

          if (aimantFluide && valeurAimantee === 100 && valeur !== 100) {
            animerVolumeVers100(valeur);
            return;
          }

          valeur = valeurAimantee;
          volumeBoost.value = valeur;
        }

        appliquerVolume(valeur);
      }

      function relacherVolume() {
        const maintenant = Date.now();

        if (maintenant - dernierRelachementVolume < 120) {
          return;
        }

        dernierRelachementVolume = maintenant;
        mettreAJourVolume(true, true);
      }

      volumeBoost.addEventListener("input", function() {
        activerAudioBoost();

        if (animationVolume) {
          cancelAnimationFrame(animationVolume);
          animationVolume = null;
        }

        mettreAJourVolume(false, false);
      });

      volumeBoost.addEventListener("change", relacherVolume);
      volumeBoost.addEventListener("touchend", relacherVolume);
      volumeBoost.addEventListener("pointerup", relacherVolume);

      mettreAJourVolume(true, false);
    }

    function initialiserAudioProgression() {
      const lecteur = document.getElementById("lecteurAudio");
      const audioProgress = document.getElementById("audioProgress");
      const audioCurrentTime = document.getElementById("audioCurrentTime");
      const audioDuration = document.getElementById("audioDuration");

      let progressionEnDeplacement = false;

      function formaterTemps(secondes) {
        if (!Number.isFinite(secondes) || secondes < 0) {
          return "0:00";
        }

        const minutes = Math.floor(secondes / 60);
        const secondesRestantes = Math.floor(secondes % 60).toString().padStart(2, "0");

        return minutes + ":" + secondesRestantes;
      }

      function mettreAJourTexteTemps() {
        audioCurrentTime.textContent = formaterTemps(lecteur.currentTime);
        audioDuration.textContent = formaterTemps(lecteur.duration);
      }

      function mettreAJourProgressionDepuisAudio() {
        mettreAJourTexteTemps();

        if (!progressionEnDeplacement && Number.isFinite(lecteur.duration) && lecteur.duration > 0) {
          audioProgress.value = Math.round((lecteur.currentTime / lecteur.duration) * 1000);
        }
      }

      function chercherDansAudio() {
        if (!Number.isFinite(lecteur.duration) || lecteur.duration <= 0) {
          audioProgress.value = 0;
          return;
        }

        const nouvellePosition = (Number(audioProgress.value) / 1000) * lecteur.duration;
        lecteur.currentTime = nouvellePosition;
        mettreAJourTexteTemps();
      }

      lecteur.addEventListener("loadedmetadata", mettreAJourProgressionDepuisAudio);
      lecteur.addEventListener("durationchange", mettreAJourProgressionDepuisAudio);
      lecteur.addEventListener("timeupdate", mettreAJourProgressionDepuisAudio);
      lecteur.addEventListener("ended", function() {
        audioProgress.value = 0;
        mettreAJourProgressionDepuisAudio();
      });

      audioProgress.addEventListener("input", function() {
        progressionEnDeplacement = true;
        chercherDansAudio();
      });

      audioProgress.addEventListener("change", function() {
        chercherDansAudio();
        progressionEnDeplacement = false;
        mettreAJourProgressionDepuisAudio();
      });

      audioProgress.addEventListener("pointerup", function() {
        progressionEnDeplacement = false;
        mettreAJourProgressionDepuisAudio();
      });

      audioProgress.addEventListener("touchend", function() {
        progressionEnDeplacement = false;
        mettreAJourProgressionDepuisAudio();
      });

      mettreAJourProgressionDepuisAudio();
    }

    function initialiserMotsAudio() {
      const lecteur = document.getElementById("lecteurAudio");
      const audioWordDisplay = document.getElementById("audioWordDisplay");

      const sousTitresAudio = [
        { debut: 10, fin: 11.25, texte: "choqué" },
        { debut: 10.75, fin: 12, texte: "turbine" },
        { debut: 12, fin: 13.5, texte: "imabarbigxrlinabarbiwxrld" },
        { debut: 15, fin: 16.5, texte: "lifeinplastixitsfantastix" },
        { debut: 17, fin: 18.5, texte: "?" },
        { debut: 21, fin: 22.5, texte: "??" },
        { debut: 24, fin: 25.5, texte: "imabarbigxrlinabarbiwxrld" },
        { debut: 27, fin: 28.5, texte: "lifeinplastixitsfantastix" },
        { debut: 29, fin: 30.5, texte: "?" },
        { debut: 31, fin: 32.5, texte: "?" },
        { debut: 33, fin: 34.5, texte: "???" },
        { debut: 36, fin: 37.5, texte: "imabarbigxrlinabarbiwxrld" },
        { debut: 39, fin: 40.5, texte: "lifeinplastixitsfantastix" },
        { debut: 46, fin: 47.5, texte: "?!?!?!?!?!?!?!?><" }
      ];

      let animationSousTitres = null;

      function mettreAJourSousTitreAudio() {
        let texteActuel = "";

        if (!lecteur.paused && !lecteur.ended) {
          const temps = lecteur.currentTime;

          const sousTitreActuel = sousTitresAudio.find(function(sousTitre) {
            return temps >= sousTitre.debut && temps < sousTitre.fin;
          });

          if (sousTitreActuel) {
            texteActuel = sousTitreActuel.texte;
          }
        }

        if (texteActuel) {
          audioWordDisplay.textContent = texteActuel;
          audioWordDisplay.classList.add("active");
        } else {
          audioWordDisplay.textContent = "";
          audioWordDisplay.classList.remove("active");
        }
      }

      function boucleSousTitres() {
        mettreAJourSousTitreAudio();

        if (!lecteur.paused && !lecteur.ended) {
          animationSousTitres = requestAnimationFrame(boucleSousTitres);
        } else {
          animationSousTitres = null;
        }
      }

      function demarrerBoucleSousTitres() {
        if (!animationSousTitres) {
          boucleSousTitres();
        }
      }

      lecteur.addEventListener("play", demarrerBoucleSousTitres);
      lecteur.addEventListener("pause", mettreAJourSousTitreAudio);
      lecteur.addEventListener("ended", mettreAJourSousTitreAudio);
      lecteur.addEventListener("seeked", mettreAJourSousTitreAudio);
      lecteur.addEventListener("seeking", mettreAJourSousTitreAudio);
      lecteur.addEventListener("timeupdate", mettreAJourSousTitreAudio);

      mettreAJourSousTitreAudio();
    }

    function activerAudioBoost() {
      const lecteur = document.getElementById("lecteurAudio");
      const volumeBoost = document.getElementById("volumeBoost");

      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }

      if (!sourceNode) {
        sourceNode = audioContext.createMediaElementSource(lecteur);
        gainNode = audioContext.createGain();
        sourceNode.connect(gainNode);
        gainNode.connect(audioContext.destination);
      }

      if (audioContext.state === "suspended") {
        audioContext.resume();
      }

      if (gainNode) {
        gainNode.gain.value = Number(volumeBoost.value) / 100;
      }
    }

    function lancerMusique() {
      afficherSection('accueil');

      const lecteur = document.getElementById("lecteurAudio");

      activerAudioBoost();

      lecteur.play().catch(function() {
        document.querySelector(".audio-box").style.display = "block";
        console.log("Le lecteur est visible. Appuie directement sur play dans le lecteur.");
      });
    }

    function afficherHeureParis() {
      const maintenant = new Date();

      const formatter = new Intl.DateTimeFormat("en-US", {
        timeZone: "Europe/Paris",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      });

      const parts = formatter.formatToParts(maintenant);

      const heureParis24 = parseInt(parts.find(part => part.type === "hour").value, 10);
      let heure = String(heureParis24 % 12).padStart(2, "0");
      let minute = parts.find(part => part.type === "minute").value;
      let seconde = parts.find(part => part.type === "second").value;
      const periode = heureParis24 < 12 ? "AM" : "PM";

      if (heure === "00" && minute === "00" && seconde === "00") {
        seconde = "01";
      }

      document.getElementById("timerTime").textContent = heure + ":" + minute + ":" + seconde;
      document.getElementById("timerPeriod").textContent = periode;
    }


    window.addEventListener("resize", demanderMajEffetsBlancsVolume, { passive: true });

    window.addEventListener("orientationchange", function() {
      setTimeout(demanderMajEffetsBlancsVolume, 150);
    }, { passive: true });

    setTimeout(function() {
      mettreAJourEffetsBlancsVolumeGlobal();
    }, 9800);


    let boucleEffetsBlancsMobile = null;

    function lancerBoucleEffetsBlancsMobile() {
      if (boucleEffetsBlancsMobile) {
        return;
      }

      const suivre = function() {
        mettreAJourEffetsBlancsVolumeGlobal();

        if (boucleEffetsBlancsMobile) {
          boucleEffetsBlancsMobile = requestAnimationFrame(suivre);
        }
      };

      boucleEffetsBlancsMobile = requestAnimationFrame(suivre);
    }

    function arreterBoucleEffetsBlancsMobile() {
      if (boucleEffetsBlancsMobile) {
        cancelAnimationFrame(boucleEffetsBlancsMobile);
        boucleEffetsBlancsMobile = null;
      }

      demanderMajEffetsBlancsVolume();
    }

    let timerScrollEffetsBlancsMobile = null;


    /* Patch final : les effets blancs sont attachés aux objets, donc plus besoin de recalcul au scroll mobile */
    function demanderMajEffetsBlancsVolume() {
      return;
    }

    function lancerBoucleEffetsBlancsMobile() {
      return;
    }

    function arreterBoucleEffetsBlancsMobile() {
      return;
    }


    /* Smartphone fluide : pas de boucle de recalcul au scroll */
    function demanderMajEffetsBlancsVolume() {
      return;
    }

    function lancerBoucleEffetsBlancsMobile() {
      return;
    }

    function arreterBoucleEffetsBlancsMobile() {
      return;
    }

    initialiserVolumeBoost();
    initialiserAudioProgression();
    initialiserMotsAudio();
    afficherHeureParis();
    setInterval(afficherHeureParis, 1000);
  </script>

<script>

    let topCible = null;
    let hauteurCible = null;
    let raf = null;

    function estSmartphone() {
      return window.innerWidth <= 768;
    }

    function hauteurViewport() {
      return window.visualViewport && window.visualViewport.height
        ? window.visualViewport.height
        : window.innerHeight;
    }

    function calculerCiblesMagicbox() {
      if (!estSmartphone()) {
        racine.style.removeProperty("--magicbox-top");
        racine.style.removeProperty("--magicbox-height");
        raf = null;
        topActuel = null;
        hauteurActuelle = null;
        topCible = null;
        hauteurCible = null;
        return;
      }

      const h = hauteurViewport();
      const paysage = window.innerWidth <= 900 && window.innerHeight <= 500 && window.matchMedia("(orientation: landscape)").matches;
      const grandSmartphone = window.innerWidth <= 430 && window.innerHeight >= 760 && !paysage;

      const ratioTop = paysage ? 0.50 : grandSmartphone ? 0.62 : 0.60;
      const margeBas = paysage ? 120 : 205;
      const hauteurMin = paysage ? 78 : grandSmartphone ? 100 : 96;

      topCible = Math.round(h * ratioTop);
      hauteurCible = Math.max(hauteurMin, Math.round(h - topCible - margeBas));

      if (topActuel === null) {
        topActuel = topCible;
        hauteurActuelle = hauteurCible;
        racine.style.setProperty("--magicbox-top", topActuel + "px");
        racine.style.setProperty("--magicbox-height", hauteurActuelle + "px");
      }

      if (!raf) {
        raf = requestAnimationFrame(animerMagicbox);
      }
    }

    function animerMagicbox() {
      if (!estSmartphone() || topCible === null || hauteurCible === null) {
        raf = null;
        return;
      }

      const douceur = 0.062;
      const stop = 0.10;

      const deltaTop = topCible - topActuel;
      const deltaHauteur = hauteurCible - hauteurActuelle;

      if (Math.abs(deltaTop) < stop) {
        topActuel = topCible;
      } else {
        topActuel += deltaTop * douceur;
      }

      if (Math.abs(deltaHauteur) < stop) {
        hauteurActuelle = hauteurCible;
      } else {
        hauteurActuelle += deltaHauteur * douceur;
      }

      racine.style.setProperty("--magicbox-top", topActuel.toFixed(2) + "px");
      racine.style.setProperty("--magicbox-height", hauteurActuelle.toFixed(2) + "px");

      /* Sécurité : @gmail ne suit jamais la magicbox */
      racine.style.removeProperty("--contact-smooth-top");
      racine.style.removeProperty("--exemple-box-smooth-top");
      racine.style.removeProperty("--exemple-box-smooth-bottom");

      if (topActuel !== topCible || hauteurActuelle !== hauteurCible) {
        raf = requestAnimationFrame(animerMagicbox);
      } else {
        raf = null;
      }
    }

    function demanderMagicbox() {
      requestAnimationFrame(calculerCiblesMagicbox);
    }

    calculerCiblesMagicbox();

    window.addEventListener("DOMContentLoaded", demanderMagicbox, { passive: true });
    window.addEventListener("resize", demanderMagicbox, { passive: true });
    window.addEventListener("orientationchange", function() {
      setTimeout(demanderMagicbox, 250);
    }, { passive: true });

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", demanderMagicbox, { passive: true });
    }
  })();
</script>

<script>
  (function() {
    let dernierLargeur = 0;
    let dernierOrientation = "";

    function estMobileLargeur() {
      return window.innerWidth <= 768;
    }

    function dimensionsStables(force) {
      const racine = document.documentElement;
      const largeur = Math.max(1, Math.round(window.innerWidth || document.documentElement.clientWidth || 1));
      const hauteur = Math.max(1, Math.round(window.innerHeight || document.documentElement.clientHeight || 1));
      const orientation = largeur > hauteur ? "landscape" : "portrait";

      /* Sur smartphone, la hauteur change souvent pendant le scroll à cause de la barre du navigateur.
         On ignore ces micro-changements pour que la vidéo reste collée comme une plaque de verre. */
      if (!force && estMobileLargeur()) {
        const largeurChange = Math.abs(largeur - dernierLargeur) > 24;
        const orientationChange = orientation !== dernierOrientation;

        if (dernierLargeur && !largeurChange && !orientationChange) {
          return;
        }
      }

      dernierLargeur = largeur;
      dernierOrientation = orientation;

      racine.style.setProperty("--site-fixed-vw", largeur + "px");
      racine.style.setProperty("--site-fixed-vh", hauteur + "px");
    }

    function lancerBlobalMp4EnBoucle() {
      const video = document.getElementById("fondVideo");
      if (!video) return;

      video.muted = true;
      video.defaultMuted = true;
      video.loop = true;
      video.autoplay = true;
      video.playsInline = true;
      video.preload = "auto";

      video.setAttribute("muted", "");
      video.setAttribute("loop", "");
      video.setAttribute("autoplay", "");
      video.setAttribute("playsinline", "");
      video.setAttribute("webkit-playsinline", "");
      video.setAttribute("preload", "auto");

      video.style.opacity = "1";
      video.style.visibility = "visible";
      video.style.display = "block";

      const lecture = video.play();
      if (lecture && typeof lecture.catch === "function") {
        lecture.catch(function() {});
      }
    }

    function reglerMagicboxSansTremblement(force) {
      const racine = document.documentElement;
      const largeur = Math.max(1, Math.round(window.innerWidth || 1));
      const hauteur = Math.max(1, Math.round(parseFloat(getComputedStyle(racine).getPropertyValue("--site-fixed-vh")) || window.innerHeight || 1));
      const paysage = largeur > hauteur;
      const mobile = largeur <= 768;

      if (!mobile) {
        racine.style.removeProperty("--rules-mobile-top");
        racine.style.removeProperty("--rules-mobile-height");
        racine.style.removeProperty("--rules-mobile-bottom");
        return;
      }

      const clamp = function(min, val, max) {
        return Math.max(min, Math.min(val, max));
      };

      let bottom;
      let hauteurBox;

      if (paysage || hauteur <= 520) {
        bottom = clamp(28, hauteur * 0.08, 62);
        hauteurBox = clamp(74, hauteur * 0.30, 142);
      } else if (hauteur <= 700) {
        bottom = clamp(62, hauteur * 0.115, 92);
        hauteurBox = clamp(118, hauteur * 0.245, 172);
      } else if (hauteur <= 860) {
        bottom = clamp(82, hauteur * 0.125, 122);
        hauteurBox = clamp(142, hauteur * 0.255, 218);
      } else {
        bottom = clamp(106, hauteur * 0.135, 158);
        hauteurBox = clamp(172, hauteur * 0.265, 260);
      }

      const top = Math.max(104, hauteur - bottom - hauteurBox);

      racine.style.setProperty("--rules-mobile-bottom", Math.round(bottom) + "px");
      racine.style.setProperty("--rules-mobile-height", Math.round(hauteurBox) + "px");
      racine.style.setProperty("--rules-mobile-top", Math.round(top) + "px");
    }

    function installerBlobalLoopInfini() {
      const video = document.getElementById("fondVideo");
      if (!video) return;

      lancerBlobalMp4EnBoucle();

      if (!video.dataset.blobalLoopInstalle) {
        video.dataset.blobalLoopInstalle = "1";

        video.addEventListener("timeupdate", function() {
          if (video.duration && video.currentTime > video.duration - 0.06) {
            try {
              video.currentTime = 0;
              video.play();
            } catch (e) {}
          }
        });

        video.addEventListener("ended", function() {
          try {
            video.currentTime = 0;
            video.play();
          } catch (e) {}
        });

        video.addEventListener("pause", function() {
          if (!document.hidden) {
            lancerBlobalMp4EnBoucle();
          }
        });

        setInterval(function() {
          if (!document.hidden && (video.paused || video.ended || video.readyState < 2)) {
            lancerBlobalMp4EnBoucle();
          }
        }, 700);
      }
    }

    function demarrerTout(force) {
      dimensionsStables(force);
      reglerMagicboxSansTremblement(force);
      installerBlobalLoopInfini();
    }

    window.addEventListener("DOMContentLoaded", function() {
      demarrerTout(true);
    });

    window.addEventListener("load", function() {
      demarrerTout(true);
    });

    window.addEventListener("resize", function() {
      dimensionsStables(false);
      reglerMagicboxSansTremblement(false);
    }, { passive: true });

    window.addEventListener("orientationchange", function() {
      setTimeout(function() {
        demarrerTout(true);
      }, 260);
    }, { passive: true });

    window.addEventListener("pageshow", function() {
      demarrerTout(false);
    });

    document.addEventListener("visibilitychange", function() {
      if (!document.hidden) {
        demarrerTout(false);
      }
    });

    document.addEventListener("click", lancerBlobalMp4EnBoucle, { once: true });
    document.addEventListener("touchstart", lancerBlobalMp4EnBoucle, { once: true });
  })();
</script>

<script id="rules-scroll-restore-script">
  (function() {
    let topActuel = null;
    let hauteurActuelle = null;
    let topCible = null;
    let hauteurCible = null;
    let raf = null;

    function estSmartphone() {
      return window.innerWidth <= 768;
    }

    function hauteurViewportStable() {
      return window.innerHeight || document.documentElement.clientHeight || 760;
    }

    function appliquerStylesFixes(box, paysage) {
      box.style.setProperty("width", "calc(100vw - 24px)", "important");
      box.style.setProperty("max-width", "calc(100vw - 24px)", "important");
      box.style.setProperty("padding", paysage ? "24px 10px" : "30px 12px", "important");
      box.style.setProperty("overflow-y", "scroll", "important");
      box.style.setProperty("-webkit-overflow-scrolling", "touch", "important");
      box.style.setProperty("touch-action", "pan-y pinch-zoom", "important");
      box.style.setProperty("pointer-events", "auto", "important");
      box.style.setProperty("transform", "translate3d(-50%, 0, 0)", "important");
    }

    function calculerCiblesMagicboxFluide() {
      const box = document.getElementById("apropos");
      if (!box) return;

      if (!estSmartphone()) {
        box.style.removeProperty("top");
        box.style.removeProperty("height");
        box.style.removeProperty("overflow-y");
        box.style.removeProperty("touch-action");
        topActuel = null;
        hauteurActuelle = null;
        topCible = null;
        hauteurCible = null;
        raf = null;
        return;
      }

      const largeur = window.innerWidth || document.documentElement.clientWidth || 390;
      const hauteur = hauteurViewportStable();
      const paysage = largeur <= 900 && hauteur <= 500 && window.matchMedia("(orientation: landscape)").matches;
      const grandSmartphone = largeur <= 430 && hauteur >= 760 && !paysage;

      const ratioTop = paysage ? 0.50 : grandSmartphone ? 0.62 : 0.60;
      const margeBas = paysage ? 120 : 205;
      const hauteurMin = paysage ? 78 : grandSmartphone ? 100 : 96;

      /* Point d'ancrage beaucoup plus bas, proche de la position de fin au scroll, sans changer la taille de la box. */
      const descente = paysage ? 34 : Math.max(86, Math.min(Math.round(hauteur * 0.145), 132));

      const topBase = Math.round(hauteur * ratioTop);
      topCible = topBase + descente;
      hauteurCible = Math.max(hauteurMin, Math.round(hauteur - topBase - margeBas));

      appliquerStylesFixes(box, paysage);

      if (topActuel === null) {
        topActuel = topCible;
        hauteurActuelle = hauteurCible;
        box.style.setProperty("top", topActuel + "px", "important");
        box.style.setProperty("height", hauteurActuelle + "px", "important");
        return;
      }

      if (!raf) {
        raf = requestAnimationFrame(animerMagicboxFluide);
      }
    }

    function animerMagicboxFluide() {
      const box = document.getElementById("apropos");

      if (!box || !estSmartphone() || topCible === null || hauteurCible === null) {
        raf = null;
        return;
      }

      /* Lent mais fluide : l'ancienne magie, avec un peu plus de velours. */
      const douceur = 0.045;
      const stop = 0.12;

      const deltaTop = topCible - topActuel;
      const deltaHauteur = hauteurCible - hauteurActuelle;

      if (Math.abs(deltaTop) < stop) {
        topActuel = topCible;
      } else {
        topActuel += deltaTop * douceur;
      }

      if (Math.abs(deltaHauteur) < stop) {
        hauteurActuelle = hauteurCible;
      } else {
        hauteurActuelle += deltaHauteur * douceur;
      }

      box.style.setProperty("top", topActuel.toFixed(2) + "px", "important");
      box.style.setProperty("height", hauteurActuelle.toFixed(2) + "px", "important");

      if (topActuel !== topCible || hauteurActuelle !== hauteurCible) {
        raf = requestAnimationFrame(animerMagicboxFluide);
      } else {
        raf = null;
      }
    }

    function brancherRulesSansBloquerGestes() {
      const box = document.getElementById("apropos");
      if (!box || box.dataset.rulesScrollRestoreOk) return;
      box.dataset.rulesScrollRestoreOk = "1";

      /* Aucun preventDefault / stopPropagation : scroll de la box + gestes navigateur restent possibles. */
      box.addEventListener("touchstart", function() {}, { passive: true });
      box.addEventListener("touchmove", function() {}, { passive: true });
      box.addEventListener("wheel", function() {}, { passive: true });
    }

    function demanderMagicboxFluide() {
      requestAnimationFrame(function() {
        calculerCiblesMagicboxFluide();
        brancherRulesSansBloquerGestes();
      });
    }

    window.addEventListener("DOMContentLoaded", demanderMagicboxFluide);
    window.addEventListener("load", demanderMagicboxFluide);
    window.addEventListener("pageshow", demanderMagicboxFluide);
    window.addEventListener("resize", demanderMagicboxFluide, { passive: true });
    window.addEventListener("orientationchange", function() {
      setTimeout(demanderMagicboxFluide, 250);
    }, { passive: true });

    document.addEventListener("click", function(event) {
      if (event.target && event.target.textContent && event.target.textContent.trim() === "RULES") {
        setTimeout(demanderMagicboxFluide, 60);
      }
    }, { passive: true });
  })();
</script>

<script id="video-smartphone-wake-lock-fix">
  (function() {
    const VIDEO_SRC = "./regardepasmalnon.mp4";
    let dernierTemps = -1;
    let compteurFreeze = 0;
    let timerRelance = null;

    function configurerVideo(video) {
      if (!video) return;

      video.muted = true;
      video.defaultMuted = true;
      video.loop = true;
      video.autoplay = true;
      video.playsInline = true;
      video.preload = "auto";

      video.setAttribute("muted", "");
      video.setAttribute("loop", "");
      video.setAttribute("autoplay", "");
      video.setAttribute("playsinline", "");
      video.setAttribute("webkit-playsinline", "");
      video.setAttribute("preload", "auto");

      video.style.opacity = "1";
      video.style.visibility = "visible";
      video.style.display = "block";
      video.style.pointerEvents = "none";

      const source = video.querySelector("source");
      if (source && source.getAttribute("src") !== VIDEO_SRC) {
        source.setAttribute("src", VIDEO_SRC);
        video.load();
      }
    }

    function jouerVideo(video) {
      if (!video || document.hidden) return;

      const lecture = video.play();
      if (lecture && typeof lecture.catch === "function") {
        lecture.catch(function() {});
      }
    }

    function petitCoupDeReveil(video) {
      if (!video || document.hidden) return;

      try {
        if (Number.isFinite(video.duration) && video.duration > 0) {
          const margeFin = Math.max(0.08, Math.min(0.25, video.duration * 0.02));
          if (video.currentTime >= video.duration - margeFin) {
            video.currentTime = 0.001;
          } else {
            video.currentTime = Math.min(video.currentTime + 0.035, Math.max(0.001, video.duration - margeFin));
          }
        } else {
          video.currentTime = Math.max(0.001, video.currentTime + 0.035);
        }
      } catch (e) {}

      jouerVideo(video);
    }

    function relancerVideoFond(force) {
      const video = document.getElementById("fondVideo");
      if (!video || document.hidden) return;

      configurerVideo(video);

      if (video.readyState < 2 || video.networkState === 3) {
        try { video.load(); } catch (e) {}
      }

      if (video.paused || video.ended || force) {
        jouerVideo(video);
      }

      if (force) {
        setTimeout(function() { jouerVideo(video); }, 120);
        setTimeout(function() { petitCoupDeReveil(video); }, 420);
        setTimeout(function() { jouerVideo(video); }, 900);
      }
    }

    function surveillerFreezeVideo() {
      const video = document.getElementById("fondVideo");
      if (!video || document.hidden) return;

      configurerVideo(video);

      if (video.paused || video.ended || video.readyState < 2) {
        compteurFreeze = 0;
        relancerVideoFond(false);
        return;
      }

      const temps = video.currentTime || 0;
      const presqueIdentique = Math.abs(temps - dernierTemps) < 0.015;

      if (presqueIdentique) {
        compteurFreeze += 1;
      } else {
        compteurFreeze = 0;
      }

      dernierTemps = temps;

      /* Après verrouillage/déverrouillage mobile, certains navigateurs gardent l'image figée
         même si la vidéo n'est pas officiellement en pause. Après 2 contrôles figés,
         on donne un petit coup de lecture sans bloquer les gestes de l'utilisateur. */
      if (compteurFreeze >= 2) {
        compteurFreeze = 0;
        petitCoupDeReveil(video);
      }
    }

    function demarrerSurveillanceVideo() {
      relancerVideoFond(true);

      if (!timerRelance) {
        timerRelance = setInterval(surveillerFreezeVideo, 900);
      }
    }

    window.addEventListener("DOMContentLoaded", demarrerSurveillanceVideo);
    window.addEventListener("load", demarrerSurveillanceVideo);

<script id="gpc-scroll-video-gmail-ultra-script">
  (function() {
    const racine = document.documentElement;

    let largeurStable = 0;
    let hauteurStable = 0;
    let orientationStable = "";

    let gmailOriginY = null;
    let glideActuel = 0;
    let glideCible = 0;
    let raf = null;
    let dernierScrollY = window.scrollY || 0;
    let contactEtaitActif = false;
    let retourGmailTimer = null;

    function mobile() {
      return window.innerWidth <= 768;
    }

    function lireVariablePx(nom) {
      const valeur = getComputedStyle(racine).getPropertyValue(nom).trim();
      if (!valeur) return null;

      const h = hauteurStable || window.innerHeight || 760;

      if (valeur.endsWith("px")) {
        const n = parseFloat(valeur);
        return Number.isFinite(n) ? n : null;
      }

      if (valeur.endsWith("vh") || valeur.endsWith("dvh") || valeur.endsWith("svh")) {
        const n = parseFloat(valeur);
        return Number.isFinite(n) ? h * n / 100 : null;
      }

      const n = parseFloat(valeur);
      return Number.isFinite(n) ? n : null;
    }

    function verrouillerVideoSansBoutRose(force) {
      const w = Math.max(1, Math.round(window.innerWidth || document.documentElement.clientWidth || 1));
      const h = Math.max(1, Math.round(window.innerHeight || document.documentElement.clientHeight || 1));
      const orientation = w > h ? "landscape" : "portrait";

      const largeurChange = Math.abs(w - largeurStable) > 24;
      const orientationChange = orientation !== orientationStable;

      /* Pas de micro-sauts pendant le scroll, mais on couvre toujours au moins 100dvh en CSS. */
      if (!force && mobile() && largeurStable && !largeurChange && !orientationChange) return;

      largeurStable = w;
      hauteurStable = h;
      orientationStable = orientation;

      racine.style.setProperty("--gpc-fixed-w", w + "px");
      racine.style.setProperty("--gpc-fixed-h", h + "px");
    }

    function calculerPositionOrigineGmail() {
      const h = hauteurStable || window.innerHeight || 760;
      const w = largeurStable || window.innerWidth || 390;
      const paysage = w <= 900 && h <= 500 && window.matchMedia("(orientation: landscape)").matches;

      const verrouille = lireVariablePx("--gmail-page-locked-top");
      if (verrouille !== null) return verrouille;

      const fixe = lireVariablePx("--gmail-fixed-top");
      if (fixe !== null) return fixe;

      const statique = lireVariablePx("--gmail-static-top");
      if (statique !== null) return statique;

      return Math.round(h * (paysage ? 0.70 : 0.76));
    }

    function contactActif() {
      const contact = document.getElementById("contact");
      return !!(contact && contact.classList.contains("active"));
    }

    function poserOrigineGmail(force) {
      if (!mobile()) {
        racine.style.removeProperty("--gmail-origin-y");
        racine.style.removeProperty("--gmail-scroll-glide");
        gmailOriginY = null;
        glideActuel = 0;
        glideCible = 0;
        raf = null;
        return;
      }

      /* Recalcul uniquement au chargement/orientation/vrai resize, jamais comme une cible qui flotte au scroll. */
      if (force || gmailOriginY === null) {
        gmailOriginY = calculerPositionOrigineGmail();
        racine.style.setProperty("--gmail-origin-y", gmailOriginY.toFixed(2) + "px");
      }
    }

    function programmerRetourGmail() {
      clearTimeout(retourGmailTimer);
      retourGmailTimer = setTimeout(function() {
        glideCible = 0;
        if (!raf) raf = requestAnimationFrame(animer);
      }, 95);
    }

    function recalculerGmail(force, impulsionScroll) {
      poserOrigineGmail(!!force);

      if (!mobile() || gmailOriginY === null) return;

      const actif = contactActif();

      if (actif && !contactEtaitActif) {
        glideActuel = Math.max(16, Math.min(30, (hauteurStable || window.innerHeight || 760) * 0.032));
        glideCible = 0;
      }

      contactEtaitActif = actif;

      if (impulsionScroll && actif) {
        const scrollY = window.scrollY || 0;
        const vitesse = Math.max(-18, Math.min(18, (scrollY - dernierScrollY) * 0.22));
        glideCible = vitesse;
        dernierScrollY = scrollY;
        programmerRetourGmail();
      } else {
        glideCible = 0;
      }

      if (!raf) raf = requestAnimationFrame(animer);
    }

    function animer() {
      if (!mobile()) {
        raf = null;
        return;
      }

      const douceurGlide = 0.065;
      const stop = 0.045;
      const delta = glideCible - glideActuel;

      if (Math.abs(delta) < stop) {
        glideActuel = glideCible;
      } else {
        glideActuel += delta * douceurGlide;
      }

      racine.style.setProperty("--gmail-scroll-glide", glideActuel.toFixed(2) + "px");

      if (glideActuel !== glideCible) {
        raf = requestAnimationFrame(animer);
      } else {
        raf = null;
      }
    }

    function demander(force, impulsionScroll) {
      requestAnimationFrame(function() {
        verrouillerVideoSansBoutRose(!!force);
        recalculerGmail(!!force, !!impulsionScroll);
      });
    }

    window.addEventListener("DOMContentLoaded", function() { demander(true, false); });
    window.addEventListener("load", function() { demander(true, false); });
    window.addEventListener("pageshow", function() { demander(true, false); });
    window.addEventListener("resize", function() { demander(false, false); }, { passive: true });
    window.addEventListener("orientationchange", function() {
      setTimeout(function() { demander(true, false); }, 240);
    }, { passive: true });

    window.addEventListener("scroll", function() {
      demander(false, true);
    }, { passive: true });

    document.addEventListener("click", function(event) {
      if (event.target && event.target.textContent && event.target.textContent.trim() === "SEND A WAV / MP3") {
        contactEtaitActif = false;
        setTimeout(function() { demander(true, false); }, 35);
        setTimeout(function() { demander(false, false); }, 180);
      }
    }, { passive: true });
  })();
</script>
